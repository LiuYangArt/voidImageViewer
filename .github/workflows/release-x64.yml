name: release-x64

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-x64-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y

      - name: Package x64 release artifacts
        shell: pwsh
        run: .\_dev\publish-release.ps1 -Action PackageAll -NoVersionBump -NoPause

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voidImageViewer-x64-release
          path: _dev/artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            _dev/artifacts/*/*.zip
            _dev/artifacts/*/*.exe
